<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
*{
box-sizing:border-box;
}

body{
margin:0;
font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
color:white;
min-height:100vh;
display:flex;
flex-direction:column;
}

header{
text-align:center;
padding:20px;
font-size:28px;
background:rgba(0,0,0,0.7);
backdrop-filter:blur(10px);
border-bottom:2px solid rgba(212,175,55,0.5);
font-weight:bold;
color:#D4AF37;
}

.container{
flex:1;
display:flex;
justify-content:center;
align-items:center;
padding:30px 20px;
}

.form-card{
background:rgba(255,255,255,0.97);
color:black;
border-radius:15px;
padding:40px;
box-shadow:0 15px 40px rgba(212,175,55,0.25), 0 8px 20px rgba(0,0,0,0.3);
border:2px solid rgba(212,175,55,0.3);
max-width:550px;
width:100%;
}

.form-card h2{
text-align:center;
margin:0 0 30px 0;
color:#D4AF37;
font-size:24px;
}

.form-group{
margin-bottom:20px;
}

.form-row{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
margin-bottom:20px;
}

.form-row .form-group{
margin-bottom:0;
}

.form-group label{
display:block;
margin-bottom:8px;
font-weight:600;
color:#333;
font-size:14px;
}

.form-group input,
.form-group select{
width:100%;
padding:12px 14px;
border:2px solid #e0e0e0;
border-radius:8px;
font-size:14px;
transition:all 0.3s;
font-family:inherit;
background:white;
color:#333;
}

.form-group input:focus,
.form-group select:focus{
outline:none;
border-color:#D4AF37;
box-shadow:0 0 0 3px rgba(212,175,55,0.2);
background:rgba(212,175,55,0.02);
}

.form-group input::placeholder{
color:#999;
}

.form-buttons{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
margin-top:30px;
}

.btn{
padding:14px 20px;
border:none;
border-radius:8px;
font-size:15px;
font-weight:bold;
cursor:pointer;
transition:all 0.3s;
text-decoration:none;
text-align:center;
}

.btn-primary{
background:#D4AF37;
color:black;
}

.btn-primary:hover{
background:#B8860B;
transform:translateY(-2px);
box-shadow:0 6px 15px rgba(212,175,55,0.4);
}

.btn-primary:active{
transform:translateY(0);
}

.btn-secondary{
background:#f0f0f0;
color:#333;
border:2px solid #e0e0e0;
}

.btn-secondary:hover{
background:#e8e8e8;
border-color:#D4AF37;
color:#D4AF37;
transform:translateY(-2px);
}

.btn-secondary:active{
transform:translateY(0);
}

.form-section-title{
margin-top:25px;
margin-bottom:15px;
font-size:13px;
font-weight:bold;
color:#D4AF37;
text-transform:uppercase;
letter-spacing:0.5px;
border-bottom:2px solid rgba(212,175,55,0.2);
padding-bottom:10px;
}

@media (max-width:600px){
.form-card{
padding:25px 20px;
border-radius:12px;
}

.form-row{
grid-template-columns:1fr;
gap:15px;
}

.form-buttons{
grid-template-columns:1fr;
}

.form-card h2{
font-size:20px;
margin-bottom:20px;
}
}

</style>
</head>

<body>

<header>🥂 The Premium Spirit</header>

<div class="container">
<div class="form-card">
<h2>เพิ่มสินค้าใหม่</h2>

<form method="post">

<div class="form-group">
<label for="name">ชื่อสินค้า *</label>
<input id="name" name="name" placeholder="เช่น Johnnie Walker Black Label" required>
</div>

<div class="form-section-title">ข้อมูลราคา</div>

<div class="form-row">
<div class="form-group">
<label for="price">ราคา (บาท) *</label>
<input id="price" name="price" placeholder="1999.00" type="number" step="0.01" required>
</div>
<div class="form-group">
<label for="stock">คงเหลือ (จำนวน) *</label>
<input id="stock" name="stock" placeholder="50" type="number" required>
</div>
</div>

<div class="form-section-title">ข้อมูลสินค้า</div>

<div class="form-row">
<div class="form-group">
<label for="alcohol">แอลกอฮอล์ (%) *</label>
<input id="alcohol" name="alcohol" placeholder="40" type="number" step="0.1" required>
</div>
<div class="form-group">
<label for="volume">ปริมาตร (ml) *</label>
<input id="volume" name="volume" placeholder="750" type="number" required>
</div>
</div>

<div class="form-group">
<label for="category">หมวดหมู่ *</label>
<select id="category" name="category" required>
<option value="" disabled selected>เลือกหมวดหมู่</option>
{% for c in categories %}
<option value="{{c.id}}">{{c.name}}</option>
{% endfor %}
</select>
</div>

<div class="form-group">
<label for="supplier">ผู้จัดจำหน่าย (Supplier) *</label>
<select id="supplier" name="supplier" required>
<option value="" disabled selected>เลือกผู้จัดจำหน่าย</option>
{% for s in suppliers %}
<option value="{{s.id}}">{{s.supplier_name}}</option>
{% endfor %}
</select>
</div>

<div class="form-section-title">ลิงก์รูปภาพ</div>

<div class="form-group">
<label for="image">URL รูปภาพ *</label>
<input id="image" name="image" placeholder="https://example.com/image.jpg" required>
</div>

<div class="form-buttons">
<button type="submit" class="btn btn-primary">💾 บันทึก</button>
<a href="/" class="btn btn-secondary">❌ ยกเลิก</a>
</div>

</form>
</div>
</div>

</body>
</html>
